# Ansible configuration for this homework project.
# Keeps all temporary files inside the project directory so the
# playbooks run cleanly in restricted / sandboxed environments.
[defaults]
# Local control-node temp directory (used by the controller).
local_tmp = ./.ansible_tmp/local
# Remote temp directory (here the remote is localhost as well).
remote_tmp = ./.ansible_tmp/remote
# Default inventory used when none is passed on the command line.
inventory = ./03_playbook_complex/inventory
# Silence the "world readable temp dir" warning for localhost runs.
allow_world_readable_tmpfiles = true
# Disable host key checking (not needed for local connections).
host_key_checking = False
# Make debug output a bit nicer.
stdout_callback = default
# Where roles are searched for in addition to the playbook's own roles/ dir.
roles_path = ./04_ansible_roles/roles
# Avoid creating .retry files all over the project.
retry_files_enabled = False
