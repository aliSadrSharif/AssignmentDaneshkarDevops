---
# Demonstrates error handling and debugging techniques.
- name: Error Handling Demo
  hosts: localhost
  connection: local
  gather_facts: yes
  tasks:
    - name: Task that fails but ignored
      # /bin/false always exits non-zero, but we ignore the failure.
      command: /bin/false
      ignore_errors: yes

    - name: Custom fail condition
      # Mark the task as failed only when our custom condition is met.
      shell: echo "Processing data"
      register: result
      failed_when: "'Error' in result.stdout"

    - name: No change reported
      # Force Ansible to never report this task as "changed".
      command: echo "status check"
      changed_when: false

    - name: Debug variable
      # Print useful facts for debugging.
      debug:
        msg: "Hostname: {{ ansible_hostname }}, RAM: {{ ansible_memtotal_mb }}MB"

    - name: Assert requirements
      # Validate that the environment meets minimum requirements.
      assert:
        that:
          - ansible_memtotal_mb >= 512
          - ansible_distribution in ["Ubuntu", "Debian"]
        fail_msg: "Requirements not met"
        success_msg: "All checks passed"
      ignore_errors: yes

    - name: Block rescue example
      # block/rescue/always works like try/except/finally.
      block:
        - name: Risky task
          command: /bin/false
      rescue:
        - name: Handle error
          debug:
            msg: "Error handled gracefully"
      always:
        - name: Cleanup
          debug:
            msg: "Always executed"
