---
# Demonstrates tags to selectively run / skip tasks.
- name: Tags Demo
  hosts: localhost
  become: yes
  tasks:
    - name: Always runs
      # The special "always" tag runs unless explicitly skipped.
      debug:
        msg: "This always executes"
      tags: always

    - name: Install web
      apt:
        name: nginx
        state: present
      tags:
        - install
        - webserver
      ignore_errors: yes

    - name: Install db
      apt:
        name: mysql-server
        state: present
      tags:
        - install
        - database
      ignore_errors: yes

    - name: Configure web
      copy:
        content: "# nginx config"
        dest: /etc/nginx/nginx.conf
      tags:
        - configure
        - webserver
      ignore_errors: yes

    - name: Configure db
      copy:
        content: "# mysql config"
        dest: /etc/mysql/my.cnf
      tags:
        - configure
        - database
      ignore_errors: yes

    - name: Never runs by default
      # The special "never" tag only runs when explicitly requested.
      debug:
        msg: "Only with --tags never"
      tags: never
