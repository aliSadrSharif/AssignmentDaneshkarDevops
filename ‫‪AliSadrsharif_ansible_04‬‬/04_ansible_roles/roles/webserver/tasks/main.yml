---
# webserver role: install nginx, deploy an index page and start the service.
- name: Install nginx
  apt:
    name: nginx
    state: present
  become: yes
  ignore_errors: yes

- name: Deploy index
  template:
    src: index.html.j2
    dest: "{{ webserver_root }}/index.html"
  become: yes
  notify: Restart nginx
  ignore_errors: yes

- name: Start nginx
  service:
    name: nginx
    state: started
  become: yes
  ignore_errors: yes
