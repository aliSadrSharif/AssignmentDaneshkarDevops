---
####################################################################
# Role: hv_vspone_object_certificate_upload_role
# Description: Upload all certificate files from a folder to VSP One Object.
####################################################################

- name: Validate certificate folder path input
  ansible.builtin.assert:
    that:
      - hv_vspone_object_certificate_upload_role_folder_path is defined
      - hv_vspone_object_certificate_upload_role_folder_path | length > 0
    fail_msg: "hv_vspone_object_certificate_upload_role_folder_path is required for hv_vspone_object_certificate_upload_role"

- name: Check certificate folder path
  ansible.builtin.stat:
    path: "{{ hv_vspone_object_certificate_upload_role_folder_path }}"
  register: hv_vspone_object_certificate_upload_role_folder_stat

- name: Fail if certificate folder path does not exist
  ansible.builtin.fail:
    msg: "Certificate folder path does not exist or is not a directory: {{ hv_vspone_object_certificate_upload_role_folder_path }}"
  when:
    - not hv_vspone_object_certificate_upload_role_folder_stat.stat.exists
      or not hv_vspone_object_certificate_upload_role_folder_stat.stat.isdir

- name: Initialize certificate upload counters
  ansible.builtin.set_fact:
    hv_vspone_object_certificate_upload_role_failed_count: 0
    hv_vspone_object_certificate_upload_role_success_count: 0
    hv_vspone_object_certificate_upload_role_failures: []

- name: Upload certificates from folder
  hitachivantara.vspone_object.oneobject_node.hv_certificates:
    connection_info: "{{ connection_info }}"
    state: "present"
    spec:
      cert_file_path: "{{ item }}"
  loop: "{{ query('fileglob', hv_vspone_object_certificate_upload_role_folder_path ~ '/*') }}"
  register: hv_vspone_object_certificate_upload_role_result
  ignore_errors: true

- name: Build certificate upload summary
  ansible.builtin.set_fact:
    hv_vspone_object_certificate_upload_role_failed_count: "{{ (hv_vspone_object_certificate_upload_role_failed_count | int) + (1 if (item.failed | default(false)) else 0) }}"
    hv_vspone_object_certificate_upload_role_success_count: "{{ (hv_vspone_object_certificate_upload_role_success_count | int) + (0 if (item.failed | default(false)) else 1) }}"
    hv_vspone_object_certificate_upload_role_failures: "{{ (hv_vspone_object_certificate_upload_role_failures | default([])) + ([{'file': item.item, 'reason': (item.msg | default(item.stderr | default('Unknown error')))}] if (item.failed | default(false)) else []) }}"
  loop: "{{ hv_vspone_object_certificate_upload_role_result.results | default([]) }}"

- name: Show certificate upload failure reasons
  ansible.builtin.debug:
    msg: "Certificate upload failed for {{ item.file }}. Reason: {{ item.reason }}"
  loop: "{{ hv_vspone_object_certificate_upload_role_failures }}"
  when: hv_vspone_object_certificate_upload_role_failed_count | int > 0

- name: Show certificate upload summary
  ansible.builtin.debug:
    msg: "Certificate upload summary: total={{ hv_vspone_object_certificate_upload_role_result.results | default([]) | length }}, success={{ hv_vspone_object_certificate_upload_role_success_count }}, failed={{ hv_vspone_object_certificate_upload_role_failed_count }}"
