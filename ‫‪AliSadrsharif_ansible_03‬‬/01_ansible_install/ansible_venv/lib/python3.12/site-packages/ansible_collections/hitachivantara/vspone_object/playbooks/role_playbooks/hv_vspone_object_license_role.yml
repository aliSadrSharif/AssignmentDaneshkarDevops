---
####################################################################
# License Workflow
#
# This playbook executes role hv_vspone_object_license_role:
# 1. Builds oneobject connection_info from vault variables
# 2. Sets serial number on VSP One Object
# 3. Uploads license file to VSP One Object
# 4. Fails if either serial number set or license upload fails
####################################################################
- name: License Workflow - Set serial number and upload license
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../ansible_vault_vars/oneobject_node_connection_variables.yml

  vars:
    connection_info:
      http_request_timeout: "{{ http_request_timeout }}"
      http_request_retry_times: "{{ http_request_retry_times }}"
      http_request_retry_interval_seconds: "{{ http_request_retry_interval_seconds }}"
      ssl: "{{ ssl }}"
      cluster_name: "{{ cluster_name }}"
      region: "{{ region }}"
      oneobject_node_username: "{{ oneobject_node_username }}"
      oneobject_node_userpass: "{{ oneobject_node_userpass }}"
      oneobject_node_client_id: "{{ oneobject_node_client_id }}"

    hv_vspone_object_license_role_serial_number: "S12345678"
    hv_vspone_object_license_role_file_path: "/path/to/license/file.txt"

  tasks:
    ####################################################################
    # Task 1 : Set serial number and upload license
    ####################################################################
    - name: Execute hv_vspone_object_license_role
      ansible.builtin.include_role:
        name: hitachivantara.vspone_object.hv_vspone_object_license_role
