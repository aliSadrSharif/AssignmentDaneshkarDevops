---
####################################################################
# Storage Component Role Workflow
#
# This playbook executes role hv_vspone_object_storage_component_role:
# 1. Loads node connection variables from vault and builds connection_info.
# 2. Invokes hv_vspone_object_storage_component_role with optional inputs:
#    - hv_vspone_object_storage_component_role_ids
#    - hv_vspone_object_storage_component_used_capacity_bytes_gt
# 3. Inside the role, inputs are validated before execution.
# 4. If IDs are provided, each component is activated, failures are collected,
#    and a success/failure summary is exposed.
# 5. If warn_threshold is provided, capacity facts are fetched and components
#    above threshold are listed.
####################################################################
- name: Storage Component Role Workflow - Activate components and/or check capacity threshold
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../ansible_vault_vars/oneobject_node_connection_variables.yml

  vars:
    connection_info:
      http_request_timeout: "{{ http_request_timeout }}"
      http_request_retry_times: "{{ http_request_retry_times }}"
      http_request_retry_interval_seconds: "{{ http_request_retry_interval_seconds }}"
      ssl: "{{ ssl }}"
      cluster_name: "{{ cluster_name }}"
      region: "{{ region }}"
      oneobject_node_username: "{{ oneobject_node_username }}"
      oneobject_node_userpass: "{{ oneobject_node_userpass }}"
      oneobject_node_client_id: "{{ oneobject_node_client_id }}"

    hv_vspone_object_storage_component_role_ids:
      - 149089342
      - 1736567732

    # Bytes threshold for capacity warnings.
    # Components with used_bytes above this value are listed by the role.
    hv_vspone_object_storage_component_used_capacity_bytes_gt: 7648460718060

  tasks:
    # ####################################################################
    # # Task 1 : Execute storage component role workflow
    # ####################################################################
    - name: Execute hv_vspone_object_storage_component_role
      ansible.builtin.include_role:
        name: hitachivantara.vspone_object.hv_vspone_object_storage_component_role
