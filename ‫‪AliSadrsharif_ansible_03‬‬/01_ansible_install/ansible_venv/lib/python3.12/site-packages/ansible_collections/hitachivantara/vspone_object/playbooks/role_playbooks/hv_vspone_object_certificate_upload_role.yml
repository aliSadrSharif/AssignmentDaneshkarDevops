---
####################################################################
# Certificate Upload Workflow: Upload certificates from folder
#
# This playbook executes role hv_vspone_object_certificate_upload_role:
# 1. Builds oneobject connection_info from vault variables
# 2. Uploads each certificate file found in the given folder path
####################################################################
- name: Certificate Upload Workflow - Upload certificates from folder
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../ansible_vault_vars/oneobject_node_connection_variables.yml

  vars:
    connection_info:
      http_request_timeout: "{{ http_request_timeout }}"
      http_request_retry_times: "{{ http_request_retry_times }}"
      http_request_retry_interval_seconds: "{{ http_request_retry_interval_seconds }}"
      ssl: "{{ ssl }}"
      cluster_name: "{{ cluster_name }}"
      region: "{{ region }}"
      oneobject_node_username: "{{ oneobject_node_username }}"
      oneobject_node_userpass: "{{ oneobject_node_userpass }}"
      oneobject_node_client_id: "{{ oneobject_node_client_id }}"

    # Folder path where each file is treated as a certificate to upload.
    hv_vspone_object_certificate_upload_role_folder_path: "/path/to/certificates/folder"

  tasks:
    ####################################################################
    # Task 1 : Upload all certificates from folder
    ####################################################################
    - name: Execute hv_vspone_object_certificate_upload_role
      ansible.builtin.include_role:
        name: hitachivantara.vspone_object.hv_vspone_object_certificate_upload_role
