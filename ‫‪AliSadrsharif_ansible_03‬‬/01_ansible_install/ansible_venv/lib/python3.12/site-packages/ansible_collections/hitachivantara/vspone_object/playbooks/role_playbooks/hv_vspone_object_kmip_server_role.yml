---
####################################################################
# KMIP Server Cipher Update Workflow
#
# This playbook executes role hv_vspone_object_kmip_server_role:
# 1. Builds oneobject connection_info from vault variables
# 2. Fetches each KMIP server by name
# 3. Updates https_ciphers using fetched server details
# 4. Continues even if one or more names fail to fetch or update
####################################################################
- name: KMIP Server Cipher Update Workflow
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../ansible_vault_vars/oneobject_node_connection_variables.yml

  vars:
    connection_info:
      http_request_timeout: "{{ http_request_timeout }}"
      http_request_retry_times: "{{ http_request_retry_times }}"
      http_request_retry_interval_seconds: "{{ http_request_retry_interval_seconds }}"
      ssl: "{{ ssl }}"
      cluster_name: "{{ cluster_name }}"
      region: "{{ region }}"
      oneobject_node_username: "{{ oneobject_node_username }}"
      oneobject_node_userpass: "{{ oneobject_node_userpass }}"
      oneobject_node_client_id: "{{ oneobject_node_client_id }}"

    hv_vspone_object_kmip_server_role_names:
      - "sample_kmip_server_1"
      - "sample_kmip_server_2"

    hv_vspone_object_kmip_server_role_https_ciphers: "TLS_RSA_WITH_AES_128_CBC_SHA256,TLS_RSA_WITH_AES_256_CBC_SHA256,TLS_ECDHE_ECDSA_WITH_AES_256_CBC_SHA384,SSL_RSA_WITH_3DES_EDE_CBC_SHA,TLS_AES_256_GCM_SHA384,TLS_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"

  tasks:
    ####################################################################
    # Task 1 : Update HTTPS ciphers for the given KMIP server names
    ####################################################################
    - name: Execute hv_vspone_object_kmip_server_role
      ansible.builtin.include_role:
        name: hitachivantara.vspone_object.hv_vspone_object_kmip_server_role
