---
# #########################################################################
# This playbook demonstrates how to lock resource groups and execute
# lifecycle operations on Global Active Device (GAD) replication pairs.
#
# The playbook demonstrates the following operations:
# 1. Lock Resource Groups on both primary and secondary storage systems
# 2. Create GAD Pair
# 3. Split GAD Pair
# 4. Resync GAD Pair
# 5. Delete GAD Pair
# 6. Unlock Resource Groups on both primary and secondary storage systems
# ############################################################################
- name: GAD and GAD Bulk Resource Group Lock Playbook
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../../ansible_vault_vars/ansible_vault_storage_var.yml

  vars:
    # Common connection info for all tasks
    connection_info:
      address: "{{ storage_address }}"
      username: "{{ vault_storage_username }}"
      password: "{{ vault_storage_secret }}"

    secondary_connection_info:
      address: "{{ secondary_storage_address }}"
      username: "{{ vault_secondary_storage_username }}"
      password: "{{ vault_secondary_storage_secret }}"

  tasks:
    # ###################################################################
    # Task 1 : Lock Resource Groups
    # ###################################################################
    - name: Lock Resource Groups
      hitachivantara.vspone_block.vsp.hv_resource_group_lock:
        connection_info: "{{ connection_info }}"
        secondary_connection_info: "{{ secondary_connection_info }}"
        spec:
          lock_timeout_sec: 300
      register: lock_resource_group_result

    - name: Debug lock resource group result
      ansible.builtin.debug:
        var: lock_resource_group_result

    ##########################################################################
    # Task 2 : Create GAD Pair using the lock tokens generated in Task 1
    ##########################################################################
    - name: Create GAD pair
      hitachivantara.vspone_block.vsp.hv_gad:
        connection_info:
          address: "{{ connection_info.address }}"
          api_token: "{{ lock_resource_group_result.locked_resource_groups.lock_token }}"
        secondary_connection_info:
          address: "{{ secondary_connection_info.address }}"
          api_token: "{{ lock_resource_group_result.locked_resource_groups.remote_lock_token }}"
        state: "forced_present"
        spec:
          copy_group_name: "copy_group_name_1"
          copy_pair_name: "copy_pair_name_1"
          primary_volume_id: 12
          secondary_pool_id: 1
          secondary_hostgroups:
            - name: "test"
              port_id: "CL1-A"
              enable_preferred_path: false
              lun_id: 1
          quorum_disk_id: 1
          mirror_unit_number: 4
      register: gad_create_result

    - name: Debug GAD create result
      ansible.builtin.debug:
        var: gad_create_result

    ##########################################################################
    # Task 3 : Split GAD Pair using the lock tokens generated in Task 1
    ##########################################################################
    - name: Split GAD pair
      hitachivantara.vspone_block.vsp.hv_gad:
        connection_info:
          address: "{{ connection_info.address }}"
          api_token: "{{ lock_resource_group_result.locked_resource_groups.lock_token }}"
        secondary_connection_info:
          address: "{{ secondary_connection_info.address }}"
          api_token: "{{ lock_resource_group_result.locked_resource_groups.remote_lock_token }}"
        state: "split"
        spec:
          copy_group_name: "copy_group_name_1"
          copy_pair_name: "copy_pair_name_1"
          local_device_group_name: "local_device_group_name"
          remote_device_group_name: "remote_device_group_name"
      register: gad_split_result

    - name: Debug GAD split result
      ansible.builtin.debug:
        var: gad_split_result

    ##########################################################################
    # Task 4 : Resync GAD Pair using the lock tokens generated in Task 1
    ##########################################################################
    - name: Resync GAD pair
      hitachivantara.vspone_block.vsp.hv_gad:
        connection_info:
          address: "{{ connection_info.address }}"
          api_token: "{{ lock_resource_group_result.locked_resource_groups.lock_token }}"
        secondary_connection_info:
          address: "{{ secondary_connection_info.address }}"
          api_token: "{{ lock_resource_group_result.locked_resource_groups.remote_lock_token }}"
        state: "resync"
        spec:
          copy_group_name: "copy_group_name_1"
          copy_pair_name: "copy_pair_name_1"
          local_device_group_name: "local_device_group_name"
          remote_device_group_name: "remote_device_group_name"
      register: gad_resync_result

    - name: Debug GAD resync result
      ansible.builtin.debug:
        var: gad_resync_result

    ##########################################################################
    # Task 5 : Delete GAD Pair using the lock tokens generated in Task 1
    ##########################################################################
    - name: Delete GAD pair
      hitachivantara.vspone_block.vsp.hv_gad:
        connection_info:
          address: "{{ connection_info.address }}"
          api_token: "{{ lock_resource_group_result.locked_resource_groups.lock_token }}"
        secondary_connection_info:
          address: "{{ secondary_connection_info.address }}"
          api_token: "{{ lock_resource_group_result.locked_resource_groups.remote_lock_token }}"
        state: "absent"
        spec:
          copy_group_name: "copy_group_name_1"
          primary_volume_id: 6
          should_delete_svol: false
      register: gad_delete_result

    - name: Debug GAD delete result
      ansible.builtin.debug:
        var: gad_delete_result

    ##########################################################################
    # Task 6 : Unlock the Resource Groups that were locked in Task 1
    ##########################################################################
    - name: Unlock Resource Group
      hitachivantara.vspone_block.vsp.hv_resource_group_lock:
        connection_info:
          address: "{{ connection_info.address }}"
          api_token: "{{ lock_resource_group_result.locked_resource_groups.lock_token }}"
        secondary_connection_info:
          address: "{{ secondary_connection_info.address }}"
          api_token: "{{ lock_resource_group_result.locked_resource_groups.remote_lock_token }}"
        state: absent
      register: unlock_resource_group_result

    - name: Debug unlock resource group result
      ansible.builtin.debug:
        var: unlock_resource_group_result
