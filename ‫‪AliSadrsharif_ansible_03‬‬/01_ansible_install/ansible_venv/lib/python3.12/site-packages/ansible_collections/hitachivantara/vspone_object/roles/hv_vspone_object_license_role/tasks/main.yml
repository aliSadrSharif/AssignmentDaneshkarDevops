---
####################################################################
# Role: hv_vspone_object_license_role
# Description: Set serial number and upload license on VSP One Object.
####################################################################

- name: Validate required connection information
  ansible.builtin.assert:
    that:
      - connection_info is defined
    fail_msg: "connection_info is required for hv_vspone_object_license_role"

- name: Validate serial number input
  ansible.builtin.assert:
    that:
      - hv_vspone_object_license_role_serial_number is defined
      - hv_vspone_object_license_role_serial_number | string | length > 0
    fail_msg: "hv_vspone_object_license_role_serial_number must be a non-empty string"

- name: Validate license file path input
  ansible.builtin.assert:
    that:
      - hv_vspone_object_license_role_file_path is defined
      - hv_vspone_object_license_role_file_path | string | length > 0
    fail_msg: "hv_vspone_object_license_role_file_path must be a non-empty string"

- name: Check license file path
  ansible.builtin.stat:
    path: "{{ hv_vspone_object_license_role_file_path }}"
  register: hv_vspone_object_license_role_file_stat

- name: Fail if license file path does not exist or is not a file
  ansible.builtin.fail:
    msg: "License file path does not exist or is not a file: {{ hv_vspone_object_license_role_file_path }}"
  when:
    - not hv_vspone_object_license_role_file_stat.stat.exists
      or not hv_vspone_object_license_role_file_stat.stat.isreg

- name: Set serial number
  hitachivantara.vspone_object.oneobject_node.hv_serial_number:
    connection_info: "{{ connection_info }}"
    state: "present"
    spec:
      serial_number: "{{ hv_vspone_object_license_role_serial_number }}"
  register: hv_vspone_object_license_role_serial_set_result
  ignore_errors: true

- name: Fail if setting serial number fails
  ansible.builtin.fail:
    msg: "Setting serial number failed. Reason: {{ hv_vspone_object_license_role_serial_set_result.msg | default(hv_vspone_object_license_role_serial_set_result.stderr | default('Unknown error')) }}"
  when: hv_vspone_object_license_role_serial_set_result.failed | default(false)

- name: Upload license
  hitachivantara.vspone_object.oneobject_node.hv_license:
    connection_info: "{{ connection_info }}"
    state: "present"
    spec:
      license_file_path: "{{ hv_vspone_object_license_role_file_path }}"
  register: hv_vspone_object_license_role_upload_result
  ignore_errors: true

- name: Fail if uploading license fails
  ansible.builtin.fail:
    msg: "Uploading license failed. Reason: {{ hv_vspone_object_license_role_upload_result.msg | default(hv_vspone_object_license_role_upload_result.stderr | default('Unknown error')) }}"
  when: hv_vspone_object_license_role_upload_result.failed | default(false)

- name: Get serial number facts
  hitachivantara.vspone_object.oneobject_node.hv_serial_number_facts:
    connection_info: "{{ connection_info }}"
  register: hv_vspone_object_license_role_serial_number_facts_result

- name: Expose serial number facts
  ansible.builtin.set_fact:
    hv_vspone_object_license_role_serial_number_facts: "{{ hv_vspone_object_license_role_serial_number_facts_result.ansible_facts.serial_number | default({}) }}"

- name: Get license facts
  hitachivantara.vspone_object.oneobject_node.hv_licenses_facts:
    connection_info: "{{ connection_info }}"
  register: hv_vspone_object_license_role_facts_result

- name: Expose license facts
  ansible.builtin.set_fact:
    hv_vspone_object_license_role_facts: "{{ hv_vspone_object_license_role_facts_result.ansible_facts.licenses | default([]) }}"

- name: Show role execution summary
  ansible.builtin.debug:
    msg:
      serial_number: "{{ hv_vspone_object_license_role_serial_number_facts }}"
      licenses: "{{ hv_vspone_object_license_role_facts }}"
