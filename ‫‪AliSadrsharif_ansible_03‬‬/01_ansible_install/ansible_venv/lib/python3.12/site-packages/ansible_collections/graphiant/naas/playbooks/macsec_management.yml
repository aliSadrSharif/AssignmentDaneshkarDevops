---
# MACsec Management Playbook
# ==========================
#
# Configures interface MACsec via graphiant_macsec and queries status via graphiant_macsec_info.
#
# CAK: omit from sample_macsec.yaml in production. Set ckn on each key in YAML; load
# vault_devices_macsec_psk (device → interface → ckn → cak) from configs/vault_secrets.yml.
#
# Vault setup (no plaintext password file; vault-password-file.sh echoes ANSIBLE_VAULT_PASSPHRASE):
#   1. cp configs/vault_secrets.yml.example configs/vault_secrets.yml
#   2. Edit vault_secrets.yml and set vault_devices_macsec_psk (device → interface → ckn → cak)
#   3. chmod +x configs/vault-password-file.sh
#   4. export ANSIBLE_VAULT_PASSPHRASE='your-vault-passphrase'
#   5. ansible-vault encrypt configs/vault_secrets.yml --vault-password-file configs/vault-password-file.sh
#   6. Pass vault password at run time: --vault-password-file configs/vault-password-file.sh or --ask-vault-pass
#
# Usage:
#   ansible-playbook playbooks/macsec_management.yml --tags configure \
#     -e config_file=sample_macsec.yaml --check --diff \
#     --vault-password-file configs/vault-password-file.sh
#
#   ansible-playbook playbooks/macsec_management.yml --tags configure_without_vault \
#     -e config_file=sample_macsec.yaml --check --diff
#     # Use only when sample YAML has dev-only plaintext cak/ckn uncommented.
#
#   ansible-playbook playbooks/macsec_management.yml --tags configure_params_examples \
#     --vault-password-file configs/vault-password-file.sh
#
#   ansible-playbook playbooks/macsec_management.yml --tags status \
#     -e macsec_device=edge-1-sdktest
#
# Tags:
#   configure, configure_without_vault, configure_params_examples, status, info

- name: MACsec Management
  hosts: localhost
  gather_facts: false
  vars:
    config_file: "sample_macsec.yaml"
    vault_secrets_path: "{{ playbook_dir }}/../configs/vault_secrets.yml"
    vault_password_script: "{{ playbook_dir }}/../configs/vault-password-file.sh"
    vault_devices_macsec_psk: {}
    macsec_device: "edge-1-sdktest"
    macsec_interface: "LAG1"

    macsec_module_param_examples:
      - device: edge-1-sdktest
        interfaces:
          LAG1:
            enabled: true
            encryptionEnforcementMode: MACSEC_ENFORCEMENT_MODE_MUST_ENCRYPT
            keyServerPriority: 200
            presharedKeys:
              - nickname: macsec-key-1
                startTime: "2029-12-11 11:12:13"
                # cak: "868a0a53ea9b6cd4d516b9c26b587efbc5856326a6996d0655cb1851ee99f4df"  # dev-only; omit in production
                ckn: "853c6a4eb4f21c58a5bfeb9600dd26e8e045ded866b02a45f5f52cebadcd5956"
                cipherSuite: AES_256_CMAC
                useXpnForCipherSuite: true
            sakConfiguration:
              replayProtectionWindowSize: 64
              rekeyInterval: 3600

    graphiant_client_params: &graphiant_client_params
      host: "{{ graphiant_host | default(lookup('env', 'GRAPHIANT_HOST')) }}"
      username: "{{ graphiant_username | default(lookup('env', 'GRAPHIANT_USERNAME')) }}"
      password: "{{ graphiant_password | default(lookup('env', 'GRAPHIANT_PASSWORD')) }}"
      access_token: "{{ graphiant_access_token | default(lookup('env', 'GRAPHIANT_ACCESS_TOKEN')) }}"

    macsec_service_params: &macsec_service_params
      <<: *graphiant_client_params
      operation: configure
      detailed_logs: true
      state: present
      vault_devices_macsec_psk: "{{ vault_devices_macsec_psk | default({}) }}"

  tasks:
    - name: Display operation info
      ansible.builtin.debug:
        msg: |
          MACsec Management
          Config file: {{ config_file }}
          Portal: {{ graphiant_host | default(lookup('env', 'GRAPHIANT_HOST')) }}
      tags: ['always', 'info']

    - name: Require vault secrets file for MACsec PSK configuration
      ansible.builtin.fail:
        msg: |
          Vault file not found: {{ vault_secrets_path }}
          Setup (no plaintext password file):
            1. cp configs/vault_secrets.yml.example configs/vault_secrets.yml
            2. Edit vault_secrets.yml and set vault_devices_macsec_psk (device → interface → ckn → cak)
            3. chmod +x configs/vault-password-file.sh
            4. export ANSIBLE_VAULT_PASSPHRASE='your-vault-passphrase'
            5. ansible-vault encrypt configs/vault_secrets.yml --vault-password-file configs/vault-password-file.sh
            6. Run with vault: --vault-password-file <path> or --ask-vault-pass
               e.g. ansible-playbook playbooks/macsec_management.yml --tags configure --vault-password-file configs/vault-password-file.sh
      when: vault_secrets_path is not file
      tags: ['configure', 'configure_params_examples']

    - name: Load vault secrets for MACsec
      ansible.builtin.include_vars:
        file: "{{ vault_secrets_path }}"
      no_log: true
      tags: ['configure', 'configure_params_examples']

    - name: Configure MACsec from YAML
      graphiant.naas.graphiant_macsec:
        <<: *macsec_service_params
        macsec_config_file: "{{ config_file }}"
      register: configure_result
      tags: ['configure', 'configure_without_vault']

    - name: Display configure result (from YAML)
      ansible.builtin.debug:
        msg: |
          {{ configure_result.msg | trim }}
          configured_devices={{ configure_result.configured_devices | default([]) }}
          skipped_devices={{ configure_result.skipped_devices | default([]) }}
      when: configure_result is defined and configure_result.msg is defined
      tags: ['configure', 'configure_without_vault']

    - name: Configure MACsec from module params examples
      graphiant.naas.graphiant_macsec:
        <<: *macsec_service_params
        device: "{{ item.device }}"
        interfaces: "{{ item.interfaces }}"
      loop: "{{ macsec_module_param_examples }}"
      loop_control:
        label: "{{ item.device }}"
      no_log: true
      tags: ['configure_params_examples']

    - name: Query MACsec monitoring status
      graphiant.naas.graphiant_macsec_info:
        <<: *graphiant_client_params
        device: "{{ macsec_device }}"
        detailed_logs: true
      register: macsec_status_result
      tags: ['status']

    - name: Display MACsec monitoring status
      ansible.builtin.debug:
        var: macsec_status_result.macsec_statuses
      when: macsec_status_result is defined
      tags: ['status']

    - name: Query MACsec status for one interface
      graphiant.naas.graphiant_macsec_info:
        <<: *graphiant_client_params
        device: "{{ macsec_device }}"
        interface: "{{ macsec_interface }}"
        detailed_logs: true
      register: macsec_iface_status
      tags: ['status']

    - name: Display interface MACsec status
      ansible.builtin.debug:
        var: macsec_iface_status.macsec_statuses
      when: macsec_iface_status is defined
      tags: ['status']
