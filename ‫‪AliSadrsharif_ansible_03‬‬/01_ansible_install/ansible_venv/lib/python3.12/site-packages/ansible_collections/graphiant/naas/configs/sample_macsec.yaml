# Sample MACsec configuration (Edge/Gateway CPE only)
# ==================================================
# PUT /v1/devices/{device_id}/config — edge branch, per main interface
#
# macsec: list of single-key dicts (portal device hostname → settings)
# Prerequisite: main LAN interfaces must exist first (interface_management.yml --tags lan).
# Optional: LAG interfaces when macsec is applied to a LAG (lag_interfaces_management.yml).
#
# Per device:
#   interfaces: map of main interface name → MACsec settings
#     enabled: true | false
#     encryptionEnforcementMode: MACSEC_ENFORCEMENT_MODE_MUST_ENCRYPT
#       (MACSEC_ENFORCEMENT_MODE_SHOULD_ENCRYPT may be available on newer images)
#     keyServerPriority: 0-255 (used when device becomes MACsec key server)
#     presharedKeys: up to 3 keys (API key pskConfigurationsByNickname)
#       - nickname: unique key name
#       - startTime: Unix seconds or UTC datetime string (e.g. '2029-12-11 11:12:13';
#         must be in the future)
#       - ckn: hex string (2-64 digits; plaintext in YAML — used to look up CAK from vault)
#       - cak: hex string (32 digits for AES_128_CMAC, 64 for AES_256_CMAC; omit in production)
#       - cipherSuite: AES_128_CMAC | AES_256_CMAC
#       - useXpnForCipherSuite: true | false (optional)
#       - state: present (default) or absent to remove a key (at least one must remain when enabled)
#     PSK rotation: add a NEW nickname (unique), then state: absent on the old nickname
#       on the old nickname. Existing nicknames cannot be updated in place (CAK/CKN/startTime/cipher).
#     sakConfiguration:
#       replayProtectionWindowSize: packets (e.g. 64)
#       rekeyInterval: seconds (must be less than key lifetime)
#
# CAK (recommended): omit cak here; set ckn on each key and pass vault_devices_macsec_psk
# (device → interface → ckn → cak hex) via Ansible Vault — see vault_secrets.yml.example
# and playbooks/macsec_management.yml --tags configure.
# Dev/local only: uncomment cak on a key entry (same pattern as sample_edge_services.yaml).

macsec:
  - edge-1-sdktest:
      interfaces:
        LAG1:
          enabled: true
          encryptionEnforcementMode: MACSEC_ENFORCEMENT_MODE_MUST_ENCRYPT
          keyServerPriority: 200
          presharedKeys:
            - nickname: macsec-key-1
              state: present
              startTime: "2028-06-01 09:00:00"
              ckn: "853c6a4eb4f21c58a5bfeb9600dd26e8e045ded866b02a45f5f52cebadcd5956"
              # cak: "868a0a53ea9b6cd4d516b9c26b587efbc5856326a6996d0655cb1851ee99f4df"  # dev-only; omit in production
              cipherSuite: AES_256_CMAC
              useXpnForCipherSuite: true
          sakConfiguration:
            replayProtectionWindowSize: 64
            rekeyInterval: 3600
        GigabitEthernet7/0/0:
          enabled: true
          encryptionEnforcementMode: MACSEC_ENFORCEMENT_MODE_MUST_ENCRYPT
          keyServerPriority: 255
          presharedKeys:
            - nickname: key1
              state: present
              startTime: "2028-06-01 15:00:00"
              ckn: "23"
              cak: "12345123451234512345123451234512"  # dev-only; omit in production
              cipherSuite: AES_128_CMAC
            - nickname: key2
              state: present
              startTime: "2028-06-01 21:00:00"
              ckn: "24"
              # cak: "1234512345123451234512345123451312345123451234512345123451234512"   # dev-only; omit in production
              cipherSuite: AES_256_CMAC
          sakConfiguration:
            replayProtectionWindowSize: 64
            rekeyInterval: 3600
  - edge-2-sdktest:
      interfaces:
        LAG1:
          enabled: true
          encryptionEnforcementMode: MACSEC_ENFORCEMENT_MODE_MUST_ENCRYPT
          keyServerPriority: 180
          presharedKeys:
            - nickname: macsec-key-lag1
              state: present
              startTime: "2028-06-02 09:00:00"
              ckn: "1a2b3c4d5e6f7890abcdef1234567890abcdef1234567890abcdef1234567890"
              # cak: "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"  # dev-only; omit in production
              cipherSuite: AES_256_CMAC
              useXpnForCipherSuite: true
          sakConfiguration:
            replayProtectionWindowSize: 64
            rekeyInterval: 3600
        GigabitEthernet8/0/0:
          enabled: true
          encryptionEnforcementMode: MACSEC_ENFORCEMENT_MODE_MUST_ENCRYPT
          keyServerPriority: 200
          presharedKeys:
            - nickname: key1
              state: present
              startTime: "2028-06-02 15:00:00"
              ckn: "31"
              cak: "abcdefabcdefabcdefabcdefabcdef12"  # dev-only; omit in production
              cipherSuite: AES_128_CMAC
            - nickname: key2
              state: present
              startTime: "2028-06-02 21:00:00"
              ckn: "32"
              # cak: "abcdefabcdefabcdefabcdefabcdefabcdefabcdefabcdefabcdefabcdefabcd"  # dev-only; omit in production
              cipherSuite: AES_256_CMAC
          sakConfiguration:
            replayProtectionWindowSize: 64
            rekeyInterval: 3600
