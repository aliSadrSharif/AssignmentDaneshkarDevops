services:
  backend-api:
    image: python:3.9-alpine
    container_name: backend-api
    command: sh -c "python3 -m http.server 5000"
    networks:
      - proxy-net

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - backend-api
    networks:
      - proxy-net

networks:
  proxy-net:
    driver: bridge
