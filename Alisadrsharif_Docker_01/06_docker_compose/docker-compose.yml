version: '3.8'
services:
  web:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      - APP_NAME=MyApp
    volumes:
      - ./web:/usr/share/nginx/html:ro
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - db-data:/var/lib/mysql
volumes:
  db-data:
