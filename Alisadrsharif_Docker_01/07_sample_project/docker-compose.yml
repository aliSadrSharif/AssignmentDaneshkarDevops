version: '3.8'
services:
  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - python-app
  python-app:
    build: ./app
    volumes:
      - ./app:/app
    working_dir: /app
networks:
  default:
    name: sample-project-network